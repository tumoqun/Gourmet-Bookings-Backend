server.port=8080
spring.application.name=demo

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/gourmet_bookings
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT (dev only — replace in production)
app.jwt.secret=gourmet-bookings-dev-secret-key-change-me-32chars-min
app.jwt.expiration-ms=28800000
